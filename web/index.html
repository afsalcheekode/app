<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Connecting Teachers, Students and Parents.">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <!-- iOS meta tags & icons -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="حركات الحياة">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png?v=2"/>

  <title>حركات الحياة</title>
  <link rel="manifest" href="manifest.json">

  <style>
    body {
      background-color: #FFFFFF;
      margin: 0;
      padding: 0;
    }
    .loading {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      margin: 0;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }

    .loader-container {
      position: relative;
      width: 200px;
      height: 200px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .loader-container::before, .loader-container::after {
      content: '';
      position: absolute;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(7, 94, 84, 0.2) 0%, rgba(37, 211, 102, 0.05) 70%, transparent 100%);
      animation: ripple 2.5s cubic-bezier(0.1, 0.5, 0.8, 1) infinite;
    }
    .loader-container::after {
      animation-delay: -1.25s;
    }

    @keyframes ripple {
      0% {
        width: 80px;
        height: 80px;
        opacity: 1;
      }
      100% {
        width: 220px;
        height: 220px;
        opacity: 0;
      }
    }

    #splash-logo {
      width: 90px;
      height: 90px;
      position: relative;
      z-index: 10;
      border-radius: 22px;
      box-shadow: 0 15px 35px rgba(7, 94, 84, 0.25);
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0px) scale(1); }
      50% { transform: translateY(-10px) scale(1.02); }
    }

    .loading-text {
      margin-top: 20px;
      color: #1E293B;
      font-family: 'Inter', sans-serif;
      font-size: 18px;
      font-weight: 500;
      letter-spacing: 1px;
    }
  </style>

  <script>
    // The value below is injected by flutter build, do not touch.
    const serviceWorkerVersion = null;
  </script>
  <!-- This script adds the flutter initialization JS code -->
  <script src="flutter.js" defer></script>
  
  <!-- Firebase JS SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore-compat.js"></script>
</head>
<body>
  <div id="loading" class="loading">
    <div class="loader-container">
      <img id="splash-logo" src="favicon.png?v=2" alt="حركات الحياة Logo">
    </div>

  </div>

  <script>
    window.addEventListener('load', function(ev) {
      // Unregister any existing service workers to clear cache loops
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(registrations) {
          for (let registration of registrations) {
            registration.unregister();
          }
        });
      }

      // Download main.dart.js
      _flutter.loader.loadEntrypoint({
        serviceWorker: {
          serviceWorkerVersion: serviceWorkerVersion,
          serviceWorkerStrategy: 'none',
        },
        onEntrypointLoaded: function(engineInitializer) {
          engineInitializer.initializeEngine({
            // Force HTML renderer for all platforms to significantly speed up initial load
            // and avoid downloading the ~3MB CanvasKit engine.
            renderer: "html",
          }).then(function(appRunner) {
            appRunner.runApp().then(function() {
              // Hide the loading screen when the app is ready
              var loading = document.getElementById('loading');
              if (loading) {
                loading.style.display = 'none';
              }
            });
          });
        }
      });
    });
  </script>
</body>
</html>
